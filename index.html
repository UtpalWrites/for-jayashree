<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jayashree ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-accent: #ffb6c1;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            background-color: transparent; /* Fixed: Removed solid color so backgrounds show through */
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- ANIMATED AURORA BACKGROUND --- */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; /* Fixed: Brought to front */
            background: linear-gradient(45deg, #0f0c29, #302b63, #240b36, #4a00e0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FLOATING HEARTS ANIMATION --- */
        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2; /* Fixed: Placed between Aurora and Glass Cards */
            overflow: hidden;
        }
        .heart-flake {
            position: absolute;
            bottom: -10%;
            color: rgba(255, 182, 193, 0.7); 
            text-shadow: 0 0 15px rgba(255, 182, 193, 0.9);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* --- THE REVEAL COVER (Tap to open) --- */
        #welcomeCover {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
        #welcomeCover h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3em;
            color: var(--text-accent);
            margin-bottom: 20px;
        }
        .tap-btn {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            animation: pulse 2s infinite;
            font-family: 'Montserrat', sans-serif;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 182, 193, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 182, 193, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 182, 193, 0); }
        }

        /* --- MAIN CONTENT & GLASSMORPHISM --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 50px 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease;
            position: relative;
            z-index: 10; /* Ensures content stays above background and hearts */
        }
        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4em;
            margin: 0;
            background: -webkit-linear-gradient(#fff, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }
        .glass-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5em;
            color: var(--text-accent);
            margin-top: 0;
            font-weight: 400;
        }

        /* --- LIVE TICKING CLOCK --- */
        .time-blocks {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .time-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            min-width: 70px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .time-num { font-size: 2.2em; font-weight: 600; display: block; }
        .time-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }

        /* --- 3D PERFECT PHOTO GALLERY --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            perspective: 1000px;
        }
        .photo-wrapper {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .photo-wrapper:hover {
            transform: translateZ(20px) scale(1.05);
            z-index: 10;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.15);
        }

        /* --- LOVE BUTTON --- */
        #loveBtn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        #loveBtn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
        }
        #messageDisplay {
            margin-top: 30px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8em;
            font-style: italic;
            min-height: 2em;
        }

        audio { width: 100%; outline: none; border-radius: 30px; }
        
        @media (max-width: 600px) {
            header h1 { font-size: 3em; }
            .time-blocks { flex-wrap: wrap; }
            .time-box { min-width: 60px; }
            .gallery { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="background"></div>

    <!-- Floating Hearts Background -->
    <div class="heart-bg" id="heartBg"></div>

    <!-- The Reveal Screen -->
    <div id="welcomeCover">
        <h1>Hello Jayashree...</h1>
        <button class="tap-btn" onclick="enterSite()">Tap to Open</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="mainContent">
        
        <header>
            <h1>My Forever & Always</h1>
        </header>

        <!-- 1. LIVE CLOCK -->
        <div class="glass-card observer-card">
            <h2>Time Since You Said Yes</h2>
            <div class="time-blocks">
                <div class="time-box">
                    <span class="time-num" id="d">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="h">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="m">00</span>
                    <span class="time-label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="s">00</span>
                    <span class="time-label">Secs</span>
                </div>
            </div>
        </div>

        <!-- 2. LOVE NOTES -->
        <div class="glass-card observer-card">
            <h2>Reasons I Love You</h2>
            <button id="loveBtn" onclick="showLove()">Tell Me Why</button>
            <div id="messageDisplay"></div>
        </div>

        <!-- 3. PERFECT ALIGNMENT GALLERY (8 Spaces) -->
        <div class="glass-card observer-card">
            <h2>Our Favorite Memories</h2>
            <div class="gallery">
                <div class="photo-wrapper"><img src="photo1.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo2.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo3.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo4.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo5.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo6.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo7.jpg" alt="Us"></div>
                <div class="photo-wrapper"><img src="photo8.jpg" alt="Us"></div>
            </div>
        </div>

        <!-- 4. MUSIC CONTROL -->
        <div class="glass-card observer-card">
            <h2>Our Song</h2>
            <p style="color: #aaa; margin-bottom: 20px;">Play the soundtrack of our story</p>
            <audio controls id="visibleAudio">
                <source src="song.mp3" type="audio/mpeg">
            </audio>
        </div>

    </div>

    <script>
        /* --- 1. HEARTS GENERATOR --- */
        function createHearts() {
            const container = document.getElementById('heartBg');
            const heartCount = 35; 
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-flake');
                heart.innerHTML = '❤';
                
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 25 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 6 + 4) + 's';
                
                // Fixed: Added negative animation delay so hearts are already on screen when she opens it
                heart.style.animationDelay = '-' + (Math.random() * 6) + 's'; 
                
                container.appendChild(heart);
            }
        }
        createHearts();

        /* --- 2. SITE REVEAL LOGIC --- */
        function enterSite() {
            const cover = document.getElementById('welcomeCover');
            cover.style.opacity = '0';
            cover.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                cover.style.display = 'none';
                document.getElementById('mainContent').classList.add('visible');
                
                const visibleMusic = document.getElementById('visibleAudio');
                visibleMusic.play().catch(e => console.log("Audio autoplay prevented"));
            }, 1000);
        }

        /* --- 3. LIVE TICKING TIMER --- */
        // Counting from July 17, 2025
        const startDate = new Date(2025, 6, 17, 0, 0, 0).getTime();

        function updateClock() {
            const now = new Date().getTime();
            const distance = now - startDate;

            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("d").innerText = days.toString().padStart(2, '0');
                document.getElementById("h").innerText = hours.toString().padStart(2, '0');
                document.getElementById("m").innerText = minutes.toString().padStart(2, '0');
                document.getElementById("s").innerText = seconds.toString().padStart(2, '0');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* --- 4. EXPANDED LOVE NOTES --- */
        const reasons = [
            "You have the most beautiful smile in Assam! ✨",
            "You believe in me and my dreams, always.",
            "Just hearing your voice makes my day better.",
            "You are not just my love, you are my best friend.",
            "I fall for you more and more every single day.",
            "You make even the simplest moments feel completely magical.",
            "Listening to our favorite songs with you is my absolute favorite thing.",
            "Your kindness and warmth light up my entire life.",
            "I love the way you look at me.",
            "You support me through every single challenge we face.",
            "Thinking about our future together is what keeps me going.",
            "You are the most beautiful person I know, inside and out."
        ];

        function showLove() {
            const display = document.getElementById("messageDisplay");
            display.style.opacity = 0;
            display.style.transform = "translateY(10px)";
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * reasons.length);
                display.innerText = `"${reasons[randomIndex]}"`;
                
                display.style.transition = "all 0.5s ease";
                display.style.opacity = 1;
                display.style.transform = "translateY(0)";
            }, 300);
        }

        /* --- 5. SCROLL REVEAL ANIMATIONS --- */
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.observer-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
